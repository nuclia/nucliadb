name: Release nidx binding

on:
  pull_request:
    branches:
      - main
    paths:
      - "nidx/**"
      - "nucliadb_protos/**"
      - .github/workflows/nidx_binding_release.yml
  push:
    branches:
      - main
    paths:
      - "nidx/**"
      - "nucliadb_protos/**"
      - .github/workflows/nidx_binding_release.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build on ${{ matrix.os }} (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu
            target: x86_64
          - os: macos
            target: aarch64

    runs-on: ${{ matrix.os }}-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: set up python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14.2"
          architecture: ${{ matrix.python-architecture || 'x64' }}

      - name: Setup env
        run: |
          python bump.py --build=${{github.run_number}}

      - run: pip install -U twine 'black>=22.3.0,<23' typing_extensions

      - name: Check system deps
        run: make -C nucliadb check-system

      - name: Install protoc (mac)
        if: ${{ matrix.os == 'macos' }}
        run: brew install protobuf

      # Run the source distribution once, as part of any platform
      - name: build sdist
        if: ${{ matrix.os == 'ubuntu' && matrix.target == 'x86_64' }}
        uses: messense/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          command: sdist
          args: -m nidx/nidx_binding/Cargo.toml --out dist

      - name: build wheels
        uses: messense/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          before-script-linux: scripts/install-protoc.sh
          target: ${{ matrix.target }}
          manylinux: 2_34
          args: -m nidx/nidx_binding/Cargo.toml --release --out dist -i python3.10

      - run: ${{ matrix.ls || 'ls -lh' }} dist/

      - run: twine check dist/*

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pypi_files-${{ matrix.os }}-${{ matrix.target }}
          path: dist

  list-pypi-files:
    needs: [build]
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: get dist artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: pypi_files-*
          merge-multiple: true
          path: dist

      - run: ls -lh dist/
      - run: echo "`ls dist | wc -l` files"

  release:
    needs: [build]
    runs-on: ubuntu-24.04
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: set up python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14.2"

      - run: pip install -U twine

      - name: get dist artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: pypi_files-*
          merge-multiple: true
          path: dist

      - run: twine check dist/*

      - name: upload to pypi
        run: twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
