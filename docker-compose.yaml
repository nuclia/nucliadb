      - "8080:8080"
      - "8060:8060"
      - "8040:8040"
    volumes:
      - nucliadb-data:/data
    depends_on:
      - postgres
      - gcs

  postgres:
    image: postgres:latest
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=nucliadb
      - POSTGRES_PASSWORD=nucliadb
      - POSTGRES_DB=nucliadb
    volumes:
