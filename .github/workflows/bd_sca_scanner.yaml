name: BD SCA Scanner
on:
  push:
    branches:
      - main
    paths:
      - '**/*.lock'
  pull_request:
    branches:
      - main
    paths:
      - '**/*.lock'

jobs:
  blackduck-sca-scan:
    runs-on: ubuntu-latest
    concurrency:
      group: bd-sca-scan-${{ github.ref_name }}
      cancel-in-progress: true
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Calculate detect-args for BD SCA Scan
        id: calculate-detect-args
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "DETECT_ARGS=--detect.excluded.directories=.bridge --detect.included.detector.types=uv,cargo --detect.uv.dependency.groups.excluded=dev --detect.timeout=600 --detect.excluded.detector.types=GIT --detect.blackduck.rapid.compare.mode=BOM_COMPARE_STRICT" >> $GITHUB_OUTPUT
          else
            echo "DETECT_ARGS=--detect.excluded.directories=.bridge --detect.included.detector.types=uv,cargo --detect.uv.dependency.groups.excluded=dev --detect.timeout=600 --detect.excluded.detector.types=GIT" >> $GITHUB_OUTPUT
          fi

      - name: Run Black Duck SCA PR Scan
        id: blackduck-pr-scan
        uses: blackduck-inc/black-duck-security-scan@3fe94e4b3c3947bd21ba46b7da255d6d3638b325 # v2.10.0
        env:
          DETECT_PROJECT_NAME: nuclia-nucliadb
          DETECT_PROJECT_GROUP_NAME: Nuclia
          DETECT_PROJECT_VERSION_NAME: main
        with:
          bridgecli_download_version: "3.7.1" # Issue with Bridge_CLI 3.8.0
          blackducksca_url: 'https://progresssoftware.app.blackduck.com'
          blackducksca_token: ${{ secrets.BD_SCA_TOKEN }}
          blackducksca_scan_full: ${{ github.event_name == 'pull_request' && 'false' || 'true' }}
          project_directory: '.'
          blackducksca_scan_failure_severities: 'BLOCKER,CRITICAL,MAJOR'
          detect_search_depth: 1
          detect_args: ${{ steps.calculate-detect-args.outputs.DETECT_ARGS }}
          include_diagnostics: false
