# -----
# nidx indexer settings
# -----

# Image settings

# -- Image pull policy
imagePullPolicy: IfNotPresent

# -- Container registry (e.g. docker.io/nuclia)
containerRegistry: CONTAINER_REGISTRY_TO_REPLACE

# -- Image name (without registry eg. nidx:latest)
image: IMAGE_TO_REPLACE

# -- Global environment variables to add to all containers
env: {}
  # -- Object store backend type for indexer.
  # INDEXER__OBJECT_STORE: s3
  # -- S3 bucket name used by indexer.
  # INDEXER__BUCKET: ndb-index-env-name
  # -- S3 region used by indexer.
  # INDEXER__REGION_NAME: env-name
  # -- Custom S3 endpoint URL for indexer.
  # INDEXER__ENDPOINT: https://<url>:9021
  # -- Enable or disable TLS certificate verification for indexer S3 connections.
  # INDEXER__ALLOW_INVALID_CERTIFICATES: "true"
  # -- S3 access key for indexer (if not using IAM or default credentials).
  # INDEXER__CLIENT_ID: "your-access-key"
  # -- S3 secret key for indexer (if not using IAM or default credentials).
  # INDEXER__CLIENT_SECRET: "your-secret-key"
  # -- GCP service account credentials for indexer (base64-encoded JSON).
  # INDEXER__BASE64_CREDS: "base64-encoded-json"
  # -- Azure Blob container URL for indexer.
  # INDEXER__CONTAINER_URL: "https://account.blob.core.windows.net/container"
  # -- Maximum number of concurrent indexer object store requests.
  # INDEXER__MAX_REQUESTS: "10"
  # -- Request timeout in seconds for indexer object store operations.
  # INDEXER__TIMEOUT: "120"
  # -- Azure storage account key for indexer.
  # INDEXER__ACCOUNT_KEY: "your-azure-account-key"
  # -- Object store backend type for storage.
  # STORAGE__OBJECT_STORE: s3
  # -- S3 bucket name used by storage.
  # STORAGE__BUCKET: ndb-nidx-env-name
  # -- S3 region used by storage.
  # STORAGE__REGION_NAME: env-name
  # -- Maximum number of concurrent storage object store requests.
  # STORAGE__MAX_REQUESTS: "10"
  # -- Request timeout in seconds for storage object store operations.
  # STORAGE__TIMEOUT: "120"
  # -- Custom S3 endpoint URL for storage.
  # STORAGE__ENDPOINT: https://<url>:9021
  # -- Enable or disable TLS certificate verification for storage S3 connections.
  # STORAGE__ALLOW_INVALID_CERTIFICATES: "true"
  # -- S3 access key for storage (if not using IAM or default credentials).
  # STORAGE__CLIENT_ID: "your-access-key"
  # -- S3 secret key for storage (if not using IAM or default credentials).
  # STORAGE__CLIENT_SECRET: "your-secret-key"
  # -- GCP service account credentials for storage (base64-encoded JSON).
  # STORAGE__BASE64_CREDS: "base64-encoded-json"
  # -- Azure Blob container URL for storage.
  # STORAGE__CONTAINER_URL: "https://account.blob.core.windows.net/container"
  # -- Azure storage account key for storage.
  # STORAGE__ACCOUNT_KEY: "your-azure-account-key"

# -- Global environment variables mount to add to all containers
envFrom: {}

# -- Global pod annotations to add to all pods
podAnnotations: {}

# -- Global pod labels to add to all pods
podLabels:
  nidxMetrics: "enabled"

# -- Enable maintenance mode, which disables writes while keeping searchers active
maintenance: false

api:
  # -- Number of replicas for the API deployment
  replicas: 2
  # -- Node selector for the API pods
  nodeSelector: {}
  # -- Topology spread constraints for the API pods
  topologySpreadConstraints: []
  # -- Pod annotations to add to the API pods
  podAnnotations: {}
  # -- Pod labels to add to the API pods
  podLabels: {}
  serviceAccount:
    # -- Whether to create a new service account
    create: false
    # -- Name of the service account to use
    name: default
    # -- Additional service account labels
    labels: {}
    # -- Additional service account annotations
    annotations: {}
  # -- Affinity settings for the API pods
  affinity: {}
  # -- Tolerations for the API pods
  tolerations: []

  pdb:
    # -- Enable or disable the PodDisruptionBudget for the API
    enabled: true
    # -- Maximum number of unavailable API pods during disruptions
    maxUnavailable: 1

  service:
    # -- Enable or disable the API service
    enabled: true
    # -- Service type for the API
    type: ClusterIP
    # -- Additional labels for the API service
    labels: {}
    # -- Annotations for the API service
    annotations: {}

indexer:
  # -- Pod annotations to add to the indexer pods
  podAnnotations: {}
  # -- Pod labels to add to the indexer pods
  podLabels: {}
  serviceAccount:
    # -- Whether to create a new service account
    create: false
    # -- Name of the service account to use
    name: default
    # -- Additional service account labels
    labels: {}
    # -- Additional service account annotations
    annotations: {}

scheduler:
  # -- Pod annotations to add to the scheduler pods
  podAnnotations: {}
  # -- Pod labels to add to the scheduler pods
  podLabels: {}
  serviceAccount:
    # -- Whether to create a new service account
    create: false
    # -- Name of the service account to use
    name: default
    # -- Additional service account labels
    labels: {}
    # -- Additional service account annotations
    annotations: {}

worker:
  # -- Pod annotations to add to the worker pods
  podAnnotations: {}
  # -- Pod labels to add to the worker pods
  podLabels: {}
  serviceAccount:
    # -- Whether to create a new service account
    create: false
    # -- Name of the service account to use
    name: default
    # -- Additional service account labels
    labels: {}
    # -- Additional service account annotations
    annotations: {}

searcher:
  # -- Number of replicas for the searcher deployment
  replicas: 2
  # -- Node selector for the searcher pods
  nodeSelector: {}
  # -- Pod annotations to add to the searcher pods
  podAnnotations: {}
  # -- Pod labels to add to the searcher pods
  podLabels: {}
  # -- Topology spread constraints for the searcher pods
  topologySpreadConstraints: []
  serviceAccount:
    # -- Whether to create a new service account
    create: false
    # -- Name of the service account to use
    name: default
    # -- Additional service account labels
    labels: {}
    # -- Additional service account annotations
    annotations: {}
  # -- Affinity settings for the searcher pods
  affinity: {}
  # -- Tolerations for the searcher pods
  tolerations: []

  pdb:
    # -- Enable or disable the PodDisruptionBudget for the searcher
    enabled: true
    # -- Maximum number of unavailable searcher pods during disruptions
    maxUnavailable: 1

  rbac:
    # -- Enable or disable RBAC for the searcher
    enabled: true

  service:
    # -- Enable or disable the searcher service
    enabled: true
    # -- Service type for the searcher
    type: ClusterIP
    # -- Additional labels for the searcher service
    labels: {}
    # -- Annotations for the searcher service
    annotations: {}
