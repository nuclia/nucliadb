## XXX This can not currently run with restrictions we have on branch protections
name: Bump Version

on:
  workflow_dispatch:
    inputs:
      semType:
        description: 'Semantic version part to bump'
        required: true
        default: 'bug'
        type: choice
        options:
        - major
        - minor
        - bug


jobs:
  bump:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

    - name: Generate a token
      id: app-token
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      with:
        app-id: ${{ secrets.GHAPP_ID_NUCLIABOT }}
        private-key: ${{ secrets.PK_GHAPP_NUCLIABOT }}
        owner: nuclia

    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        persist-credentials: false
        fetch-depth: 0

    - run: python bump.py --sem=${{ inputs.semType }}

    - name: Setup Python
      uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
      with:
        python-version: "3.14.6"

    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

    # we update the lock to reflect the newly updated versions of our packages
    - name: Update uv.lock
      run: uv lock

    - name: Commit & Push changes
      uses: actions-js/push@5a7cbd780d82c0c937b5977586e641b2fd94acc5 # v1.5
      with:
        github_token: ${{ steps.app-token.outputs.token }}
